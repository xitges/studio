<!doctype html>

<head>

<title>FIELDLAB / TR-1 — Tabletop DAW</title>
<meta name="viewport" content="width=1440" />
<link rel="preconnect" href="https://fonts.googleapis.com" />

<style>
  :root {
    /* defaults — overridden by Tweaks */
    --chassis: #e6dec9;
    --chassis-2: #ddd3ba;
    --chassis-shadow: #b9ad8c;
    --ink: #1a1612;
    --ink-soft: #4a4338;
    --ink-faint: #8c8170;
    --panel: #f3ecda;
    --panel-rim: #c7bb9a;
    --accent: #d8412a;       /* saturated red */
    --accent-2: #f06b54;
    --display-bg: #0d1410;
    --display-fg: #b9ff66;
    --led-off: #6e624a;
    --led-red: #ff4233;
    --led-amber: #ffb020;
    --led-green: #6cff6c;
    --line: rgba(0,0,0,0.18);
    --rule: rgba(0,0,0,0.08);
    --metal: linear-gradient(180deg,#cfc7b1 0%,#aea58c 50%,#928975 100%);
    --metal-dark: linear-gradient(180deg,#3a342a 0%,#23201a 100%);
    --pad: #2a251e;
  }
  html,body { margin:0; padding:0; background:#1a1612; font-family:"JetBrains Mono",ui-monospace,monospace; color:var(--ink); -webkit-font-smoothing:antialiased; }
  body {
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(1200px 600px at 50% 0%, rgba(255,255,255,0.04), transparent 60%),
      #161310;
    padding:24px;
    box-sizing:border-box;
  }
  #root { width:100%; max-width:1392px; }

  /* Hide scrollbars on inner scrollers but keep them functional */
  .scroll::-webkit-scrollbar { height:6px; width:6px; }
  .scroll::-webkit-scrollbar-thumb { background:rgba(0,0,0,0.25); border-radius:3px; }
</style>
</head>

<div id="root"></div>
